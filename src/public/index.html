<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReplyHandler — Admin Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1e1e1e;
      --border: #2a2a2a;
      --text: #e5e5e5;
      --text-muted: #888;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ─── Layout ──────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header h1 span { color: var(--accent); }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ─── Stats Bar ───────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .stat-card .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
    }

    /* ─── Toolbar ─────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .toolbar h2 {
      font-size: 16px;
      font-weight: 600;
    }

    /* ─── Buttons ─────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: var(--surface-2);
      color: var(--text);
    }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1px solid var(--border);
    }

    .btn-danger:hover { background: rgba(239, 68, 68, 0.1); }

    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* ─── Client Cards ────────────────────── */
    .client-grid {
      display: grid;
      gap: 16px;
    }

    .client-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .client-card:hover { border-color: var(--accent); }

    .client-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .client-name {
      font-size: 16px;
      font-weight: 600;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .status-active {
      background: rgba(34, 197, 94, 0.12);
      color: var(--green);
    }

    .status-inactive {
      background: rgba(239, 68, 68, 0.12);
      color: var(--red);
    }

    .client-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .client-meta .key-present { color: var(--green); }
    .client-meta .key-missing { color: var(--text-muted); opacity: 0.5; }

    /* ─── Modal ───────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      justify-content: center;
      align-items: flex-start;
      padding-top: 60px;
      overflow-y: auto;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 640px;
      margin-bottom: 60px;
      animation: slideUp 0.2s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 { font-size: 16px; font-weight: 600; }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
    }

    .modal-close:hover { color: var(--text); }

    .modal-body { padding: 24px; }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
    }

    /* ─── Forms ───────────────────────────── */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-group .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* ─── Detail View ─────────────────────── */
    .detail-section {
      margin-bottom: 24px;
    }

    .detail-section h4 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 8px 0;
      font-size: 13px;
    }

    .detail-row .label {
      color: var(--text-muted);
      min-width: 140px;
    }

    .detail-row .value {
      text-align: right;
      word-break: break-all;
      max-width: 380px;
    }

    .webhook-url {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      word-break: break-all;
    }

    .webhook-url .url-text { flex: 1; }

    .copy-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px;
      font-size: 14px;
      flex-shrink: 0;
    }

    .copy-btn:hover { color: var(--accent); }
    .copy-btn.copied { color: var(--green); }

    /* ─── Toast ───────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 20px;
      font-size: 13px;
      z-index: 200;
      animation: fadeIn 0.2s ease;
    }

    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--red); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Empty State ─────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { margin-bottom: 16px; }

    /* ─── Masked field ────────────────────── */
    .masked {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      cursor: pointer;
    }

    .masked:hover { color: var(--accent); }
  </style>
</head>
<body>

<div class="header">
  <h1><span>Reply</span>Handler</h1>
  <button class="btn btn-primary" onclick="openCreateModal()">+ Add Client</button>
</div>

<div class="container">
  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <h2>Clients</h2>
    <button class="btn btn-ghost btn-sm" onclick="loadClients()">Refresh</button>
  </div>

  <div class="client-grid" id="clientGrid"></div>
</div>

<!-- Create / Edit Modal -->
<div class="modal-overlay" id="formModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="formTitle">Add Client</h3>
      <button class="modal-close" onclick="closeModal('formModal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editClientId">

      <div class="form-group">
        <label>Client Name *</label>
        <input type="text" id="f_name" placeholder="Acme Corp">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>SmartLead API Key</label>
          <input type="text" id="f_smartlead_api_key" placeholder="sl_key_...">
        </div>
        <div class="form-group">
          <label>HeyReach API Key</label>
          <input type="text" id="f_heyreach_api_key" placeholder="hr_key_...">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Slack Bot Token *</label>
          <input type="text" id="f_slack_bot_token" placeholder="xoxb-...">
        </div>
        <div class="form-group">
          <label>Slack Channel ID *</label>
          <input type="text" id="f_slack_channel_id" placeholder="C0123456789">
        </div>
      </div>

      <div class="form-group">
        <label>Cal.com Event Type ID</label>
        <input type="text" id="f_calcom_event_type_id" placeholder="123456">
      </div>

      <div class="form-group">
        <label>Voice Prompt</label>
        <textarea id="f_voice_prompt" placeholder="Direct, no-nonsense tone. Speak like a fellow practitioner, not a salesperson. Never use filler phrases. Keep replies to 2-3 sentences."></textarea>
        <div class="hint">Describes how AI-drafted replies should sound for this client.</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('formModal')">Cancel</button>
      <button class="btn btn-primary" id="formSubmitBtn" onclick="submitForm()">Create Client</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="detailTitle">Client Details</h3>
      <button class="modal-close" onclick="closeModal('detailModal')">&times;</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="toggleActiveBtn" onclick="toggleActive()">Deactivate</button>
      <button class="btn btn-ghost" onclick="closeModal('detailModal')">Close</button>
      <button class="btn btn-primary" onclick="openEditFromDetail()">Edit</button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let clients = [];
let currentDetailClient = null;

// ─── Load ────────────────────────────────────────────
async function loadClients() {
  try {
    const res = await fetch(`${API}/admin/clients`);
    clients = await res.json();
    renderStats();
    renderGrid();
  } catch (err) {
    toast('Failed to load clients', 'error');
  }
}

function renderStats() {
  const active = clients.filter(c => c.active).length;
  const withSmartlead = clients.filter(c => c.smartlead_api_key).length;
  const withHeyreach = clients.filter(c => c.heyreach_api_key).length;

  document.getElementById('stats').innerHTML = `
    <div class="stat-card">
      <div class="label">Total Clients</div>
      <div class="value">${clients.length}</div>
    </div>
    <div class="stat-card">
      <div class="label">Active</div>
      <div class="value" style="color: var(--green)">${active}</div>
    </div>
    <div class="stat-card">
      <div class="label">SmartLead Connected</div>
      <div class="value">${withSmartlead}</div>
    </div>
    <div class="stat-card">
      <div class="label">HeyReach Connected</div>
      <div class="value">${withHeyreach}</div>
    </div>
  `;
}

function renderGrid() {
  const grid = document.getElementById('clientGrid');

  if (clients.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="icon">&#128203;</div>
        <p>No clients yet. Add your first client to get started.</p>
        <button class="btn btn-primary" onclick="openCreateModal()">+ Add Client</button>
      </div>
    `;
    return;
  }

  grid.innerHTML = clients.map(c => `
    <div class="client-card" onclick="openDetail('${c.id}')">
      <div class="client-card-header">
        <span class="client-name">${esc(c.name)}</span>
        <span class="status-badge ${c.active ? 'status-active' : 'status-inactive'}">
          ${c.active ? 'Active' : 'Inactive'}
        </span>
      </div>
      <div class="client-meta">
        <span class="${c.smartlead_api_key ? 'key-present' : 'key-missing'}">
          ${c.smartlead_api_key ? '&#10003;' : '&#10007;'} SmartLead
        </span>
        <span class="${c.heyreach_api_key ? 'key-present' : 'key-missing'}">
          ${c.heyreach_api_key ? '&#10003;' : '&#10007;'} HeyReach
        </span>
        <span class="${c.calcom_event_type_id ? 'key-present' : 'key-missing'}">
          ${c.calcom_event_type_id ? '&#10003;' : '&#10007;'} Cal.com
        </span>
        <span style="color: var(--text-muted)">
          Added ${new Date(c.created_at).toLocaleDateString()}
        </span>
      </div>
    </div>
  `).join('');
}

// ─── Detail ──────────────────────────────────────────
function openDetail(id) {
  const c = clients.find(x => x.id === id);
  if (!c) return;
  currentDetailClient = c;

  document.getElementById('detailTitle').textContent = c.name;
  document.getElementById('toggleActiveBtn').textContent = c.active ? 'Deactivate' : 'Activate';

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-section">
      <h4>Webhook URLs</h4>
      <div class="webhook-url">
        <span class="url-text">${esc(c.smartlead_webhook_url)}</span>
        <button class="copy-btn" onclick="copyText('${esc(c.smartlead_webhook_url)}', this)" title="Copy">&#128203;</button>
      </div>
      <div style="font-size:11px; color:var(--text-muted); margin-bottom:12px">Paste into SmartLead campaign webhook settings</div>
      <div class="webhook-url">
        <span class="url-text">${esc(c.heyreach_webhook_url)}</span>
        <button class="copy-btn" onclick="copyText('${esc(c.heyreach_webhook_url)}', this)" title="Copy">&#128203;</button>
      </div>
      <div style="font-size:11px; color:var(--text-muted)">Paste into HeyReach campaign webhook settings</div>
    </div>

    <div class="detail-section">
      <h4>Credentials</h4>
      <div class="detail-row">
        <span class="label">SmartLead API Key</span>
        <span class="value masked" onclick="toggleMask(this, '${esc(c.smartlead_api_key || '')}')">${mask(c.smartlead_api_key)}</span>
      </div>
      <div class="detail-row">
        <span class="label">HeyReach API Key</span>
        <span class="value masked" onclick="toggleMask(this, '${esc(c.heyreach_api_key || '')}')">${mask(c.heyreach_api_key)}</span>
      </div>
      <div class="detail-row">
        <span class="label">Slack Bot Token</span>
        <span class="value masked" onclick="toggleMask(this, '${esc(c.slack_bot_token || '')}')">${mask(c.slack_bot_token)}</span>
      </div>
      <div class="detail-row">
        <span class="label">Slack Channel ID</span>
        <span class="value">${esc(c.slack_channel_id)}</span>
      </div>
      <div class="detail-row">
        <span class="label">Cal.com Event Type ID</span>
        <span class="value">${esc(c.calcom_event_type_id || '—')}</span>
      </div>
    </div>

    <div class="detail-section">
      <h4>Voice Prompt</h4>
      <div style="font-size:13px; color:var(--text-muted); white-space:pre-wrap">${esc(c.voice_prompt || 'No voice prompt set.')}</div>
    </div>

    <div class="detail-section">
      <h4>Info</h4>
      <div class="detail-row">
        <span class="label">Client ID</span>
        <span class="value" style="font-family:monospace; font-size:12px">${c.id}</span>
      </div>
      <div class="detail-row">
        <span class="label">Created</span>
        <span class="value">${new Date(c.created_at).toLocaleString()}</span>
      </div>
      <div class="detail-row">
        <span class="label">Last Updated</span>
        <span class="value">${new Date(c.updated_at).toLocaleString()}</span>
      </div>
    </div>
  `;

  openModal('detailModal');
}

async function toggleActive() {
  if (!currentDetailClient) return;
  const newState = !currentDetailClient.active;
  try {
    await fetch(`${API}/admin/clients/${currentDetailClient.id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ active: newState }),
    });
    toast(`Client ${newState ? 'activated' : 'deactivated'}`, 'success');
    closeModal('detailModal');
    loadClients();
  } catch (err) {
    toast('Failed to update client', 'error');
  }
}

// ─── Create / Edit ───────────────────────────────────
function openCreateModal() {
  document.getElementById('formTitle').textContent = 'Add Client';
  document.getElementById('formSubmitBtn').textContent = 'Create Client';
  document.getElementById('editClientId').value = '';
  clearForm();
  openModal('formModal');
}

function openEditFromDetail() {
  const c = currentDetailClient;
  if (!c) return;
  closeModal('detailModal');

  document.getElementById('formTitle').textContent = 'Edit Client';
  document.getElementById('formSubmitBtn').textContent = 'Save Changes';
  document.getElementById('editClientId').value = c.id;
  document.getElementById('f_name').value = c.name || '';
  document.getElementById('f_smartlead_api_key').value = c.smartlead_api_key || '';
  document.getElementById('f_heyreach_api_key').value = c.heyreach_api_key || '';
  document.getElementById('f_slack_bot_token').value = c.slack_bot_token || '';
  document.getElementById('f_slack_channel_id').value = c.slack_channel_id || '';
  document.getElementById('f_calcom_event_type_id').value = c.calcom_event_type_id || '';
  document.getElementById('f_voice_prompt').value = c.voice_prompt || '';

  openModal('formModal');
}

async function submitForm() {
  const id = document.getElementById('editClientId').value;
  const data = {
    name: document.getElementById('f_name').value.trim(),
    smartlead_api_key: document.getElementById('f_smartlead_api_key').value.trim() || null,
    heyreach_api_key: document.getElementById('f_heyreach_api_key').value.trim() || null,
    slack_bot_token: document.getElementById('f_slack_bot_token').value.trim(),
    slack_channel_id: document.getElementById('f_slack_channel_id').value.trim(),
    calcom_event_type_id: document.getElementById('f_calcom_event_type_id').value.trim() || null,
    voice_prompt: document.getElementById('f_voice_prompt').value.trim(),
  };

  if (!data.name || !data.slack_bot_token || !data.slack_channel_id) {
    toast('Name, Slack Bot Token, and Slack Channel ID are required', 'error');
    return;
  }

  try {
    const isEdit = !!id;
    const url = isEdit ? `${API}/admin/clients/${id}` : `${API}/admin/clients`;
    const method = isEdit ? 'PATCH' : 'POST';

    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Request failed');
    }

    toast(isEdit ? 'Client updated' : 'Client created', 'success');
    closeModal('formModal');
    loadClients();
  } catch (err) {
    toast(err.message, 'error');
  }
}

function clearForm() {
  ['f_name', 'f_smartlead_api_key', 'f_heyreach_api_key', 'f_slack_bot_token',
   'f_slack_channel_id', 'f_calcom_event_type_id', 'f_voice_prompt'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

// ─── Helpers ─────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('active');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

function mask(val) {
  if (!val) return '<span style="opacity:0.3">Not set</span>';
  if (val.length <= 8) return '••••••••';
  return val.slice(0, 4) + '••••' + val.slice(-4);
}

function toggleMask(el, val) {
  if (!val) return;
  if (el.dataset.revealed === 'true') {
    el.innerHTML = mask(val);
    el.dataset.revealed = 'false';
  } else {
    el.textContent = val;
    el.dataset.revealed = 'true';
  }
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = '&#10003;';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '&#128203;';
    }, 1500);
  });
}

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('active');
  });
});

// Close modals on Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
  }
});

// ─── Init ────────────────────────────────────────────
loadClients();
</script>
